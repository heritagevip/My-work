<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Student Admission Form</title>
</head>
<body>
    <main class="form-page">
        <section class="form-card">
            <header>
                <h1>Student Admission Form</h1>
                <p>Fill in the details below to apply for admission.</p>
            </header>

            <form action="#" method="post" class="admission-form">
                <div class="form-grid">
                    <label>
                        <span>Full Name</span>
                        <input type="text" name="fullName" placeholder="Enter your full name" required>
                    </label>

                    <label>
                        <span>Email Address</span>
                        <input type="email" name="email" placeholder="student@example.com" required>
                    </label>

                    <label>
                        <span>Phone Number</span>
                        <input type="tel" name="phone" placeholder="(555) 123-4567" required>
                    </label>

                    <label>
                        <span>Date of Birth</span>
                        <input type="date" name="dob" required>
                    </label>

                    <label>
                        <span>Gender</span>
                        <select name="gender" required>
                            <option value="">Select gender</option>
                            <option value="female">Female</option>
                            <option value="male">Male</option>
                            <option value="nonbinary">Non-binary</option>
                            <option value="preferNot">Prefer not to say</option>
                        </select>
                    </label>

                    <label>
                        <span>Course Applied For</span>
                        <select name="course" required>
                            <option value="">Choose a course</option>
                            <option value="science">Science</option>
                            <option value="commerce">Commerce</option>
                            <option value="arts">Arts</option>
                            <option value="computer">Computer Science</option>
                        </select>
                    </label>

                    <label>
                        <span>Previous School</span>
                        <input type="text" name="previousSchool" placeholder="Enter your previous school" required>
                    </label>

                    <label>
                        <span>Admission Year</span>
                        <input type="number" name="admissionYear" placeholder="2026" min="2023" max="2030" required>
                    </label>
                </div>

                <label class="full-width">
                    <span>Parent / Guardian Name</span>
                    <input type="text" name="guardianName" placeholder="Enter parent or guardian name" required>
                </label>

                <label class="full-width">
                    <span>Address</span>
                    <textarea name="address" rows="4" placeholder="Home address" required></textarea>
                </label>

                <label class="checkbox-label">
                    <input type="checkbox" name="terms" required>
                    <span>I confirm that the information provided is correct.</span>
                </label>

                <button type="submit" class="submit-button">Submit Application</button>
            </form>
        </section>
    </main>
</body>
</html>
